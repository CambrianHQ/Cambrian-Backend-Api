name: Backend CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:
  workflow_call:  # Allow deploy workflows to reuse this pipeline

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore Cambrian.sln
      - name: Build
        run: dotnet build Cambrian.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test Cambrian.sln --no-build --configuration Release --logger "console;verbosity=minimal"

  contract-validation:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need git history for baseline comparison

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore & Build
        run: |
          dotnet restore Cambrian.sln
          dotnet build src/Cambrian.Api/Cambrian.Api.csproj --no-restore --configuration Release

      - name: Restore Swashbuckle CLI
        run: dotnet tool restore

      - name: Generate OpenAPI spec from compiled assembly
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=ci_openapi;Username=unused;Password=unused"
        run: |
          dotnet swagger tofile --output contracts/openapi.generated.json \
            src/Cambrian.Api/bin/Release/net8.0/Cambrian.Api.dll v1

      - name: Architecture Compliance
        run: node scripts/validate-contracts.cjs

      - name: Breaking Change Detection
        run: node scripts/detect-breaking-changes.cjs contracts/openapi.generated.json

  security:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: NuGet vulnerability scan
        run: |
          dotnet restore Cambrian.sln
          dotnet list Cambrian.sln package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -qi "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi
