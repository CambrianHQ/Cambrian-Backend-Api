name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Cambrian.sln
      - name: Build
        run: dotnet build Cambrian.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test Cambrian.sln --no-build --configuration Release
