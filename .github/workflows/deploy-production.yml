name: Deploy Production Backend

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Cambrian.sln
      - name: Build
        run: dotnet build Cambrian.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test Cambrian.sln --no-build --configuration Release

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub settings
    steps:
      - name: Deploy to Render (production)
        run: |
          curl -sf -X POST "${{ secrets.PROD_DEPLOY_WEBHOOK }}" \
            || echo "::warning::Deploy hook not configured — Render auto-deploys from main branch"

      - name: Post-deploy health check
        if: ${{ secrets.PROD_API_URL != '' }}
        run: |
          echo "Waiting 60s for deployment to stabilize..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.PROD_API_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i returned $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1
