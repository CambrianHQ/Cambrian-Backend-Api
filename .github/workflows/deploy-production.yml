name: Deploy Production Backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-progress production deploy

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production  # Requires manual approval in GitHub settings
    steps:
      - name: Deploy to Render (production)
        run: |
          curl -sf -X POST "${{ secrets.PROD_DEPLOY_WEBHOOK }}" \
            || echo "::warning::Deploy hook not configured — Render auto-deploys from main branch"

      - name: Post-deploy health check
        timeout-minutes: 5
        env:
          # The prod API base is a PUBLIC url (published throughout docs/), so it
          # lives in version control as a reviewable default rather than a secret
          # that can silently drift. The secret is honored only as an override.
          PROD_API_URL: ${{ secrets.PROD_API_URL || 'https://cambrian-backend-api.onrender.com' }}
        run: |
          # Strip any trailing slash so we never build a `//health` url — the
          # Render edge 404s on double-slash, which historically failed this gate
          # even while prod was perfectly healthy.
          BASE="${PROD_API_URL%/}"
          echo "Health-checking ${BASE}/health"
          echo "Waiting 60s for deployment to stabilize..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${BASE}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i returned $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 5 attempts against ${BASE}/health"
          exit 1
