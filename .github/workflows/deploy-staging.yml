name: Deploy Staging Backend

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to Render (staging)
        run: |
          curl -sf -X POST "${{ secrets.STAGING_DEPLOY_WEBHOOK }}" \
            || echo "::warning::Deploy hook not configured — Render auto-deploys from staging branch"

      - name: Post-deploy health check
        timeout-minutes: 5
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        if: env.STAGING_API_URL != ''
        run: |
          # Strip any trailing slash so we never build a `//health` url (the
          # Render edge 404s on double-slash even when the service is healthy).
          BASE="${STAGING_API_URL%/}"
          echo "Health-checking ${BASE}/health"
          echo "Waiting 60s for deployment to stabilize..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${BASE}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i returned $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 5 attempts against ${BASE}/health"
          exit 1
