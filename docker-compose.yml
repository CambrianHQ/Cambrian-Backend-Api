version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cambrian
      POSTGRES_USER: cambrian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambrian}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cambrian"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=cambrian;Username=cambrian;Password=${POSTGRES_PASSWORD:-cambrian}"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "cambrian-api"
      Jwt__Audience: "cambrian-client"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-}"
      Storage__Provider: "${STORAGE_PROVIDER:-local}"
      Storage__Endpoint: "${STORAGE_ENDPOINT:-}"
      Storage__Bucket: "${STORAGE_BUCKET:-cambrian-audio}"
      Storage__AccessKey: "${STORAGE_ACCESS_KEY:-}"
      Storage__SecretKey: "${STORAGE_SECRET_KEY:-}"
      Email__Provider: "${EMAIL_PROVIDER:-console}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__SmtpUser: "${EMAIL_SMTP_USER:-}"
      Email__SmtpPass: "${EMAIL_SMTP_PASS:-}"
      App__FrontendUrl: "${FRONTEND_URL:-http://localhost:5173}"
      App__CorsOrigins: "${CORS_ORIGINS:-}"
    env_file:
      - .env

volumes:
  pgdata:
