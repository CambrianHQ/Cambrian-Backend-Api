apiVersion: 1

providers:
  - name: Cambrian
    orgId: 1
    folder: Cambrian
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      # Mounted from ../grafana/dashboards in docker-compose.yml.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
