# Render Infrastructure-as-Code blueprint
# Docs: https://docs.render.com/infrastructure-as-code
#
# Deploy:
#   1. Push to default branch
#   2. Render Dashboard -> Blueprints -> New Blueprint Instance
#   3. Select this repo -> confirm

databases:
  # -- Staging database -----------------------------------------------
  - name: cambrian-db-staging
    plan: free
    region: oregon
    databaseName: cambrian_staging
    user: cambrian
    postgresMajorVersion: "16"

  # -- Production database ---------------------------------------------
  - name: cambrian-db-prod
    plan: basic            # paid plan for persistent storage
    region: oregon
    databaseName: cambrian_prod
    user: cambrian
    postgresMajorVersion: "16"

services:
  # ====================================================================
  #  STAGING API
  # ====================================================================
  - type: web
    name: cambrian-api-staging
    runtime: docker
    repo: https://github.com/Cambrian-by-Kinetix-Interactive/Cambrian-Backend-Api
    branch: staging
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render injects PORT -- Dockerfile entrypoint uses it
      - key: PORT
        value: "10000"
      # .NET environment
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      # Database -- Render auto-populates from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: cambrian-db-staging
          property: connectionString
      # JWT -- generate a strong >=32-char secret in the Render dashboard       
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      # Stripe -- test keys for staging
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      # Object storage -- S3/R2 (same provider as production, separate bucket)
      - key: Storage__Provider
        sync: false
      - key: Storage__Endpoint
        sync: false
      - key: Storage__Bucket
        value: cambrian-audio-staging
      - key: Storage__AccessKey
        sync: false
      - key: Storage__SecretKey
        sync: false
      - key: Storage__Region
        value: auto
      - key: Storage__UsePathStyle
        value: "true"
      - key: Storage__PublicUrl
        sync: false
      # Email -- Resend for staging (same domain, tagged sender name)
      - key: Email__Provider
        value: resend
      - key: Email__FromAddress
        value: noreply@cambrianmusic.com
      - key: Email__FromName
        value: "Cambrian Music (Staging)"
      - key: Email__ResendApiKey
        sync: false
      # Rate limiting -- relaxed for staging
      - key: RateLimiting__GlobalPermitLimit
        value: "500"
      - key: RateLimiting__AuthPermitLimit
        value: "100"
      # Admin seed account
      - key: Admin__Email
        sync: false
      - key: Admin__Password
        sync: false
      # Frontend CORS
      - key: App__FrontendUrl
        value: https://staging.cambrianmusic.com
      - key: App__CorsOrigins
        value: "https://staging.cambrianmusic.com,http://localhost:5173"
      # Vercel preview deployment CORS wildcard
      - key: App__VercelProjectSlug
        value: cambrian
  # ====================================================================
  #  PRODUCTION API
  # ====================================================================
  - type: web
    name: cambrian-api
    runtime: docker
    repo: https://github.com/Cambrian-by-Kinetix-Interactive/Cambrian-Backend-Api
    branch: main
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: cambrian-db-prod
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Storage__Provider
        sync: false           # must be s3 or r2 -- app refuses to start with local in Production
      - key: Storage__Endpoint
        sync: false
      - key: Storage__Bucket
        sync: false
      - key: Storage__AccessKey
        sync: false
      - key: Storage__SecretKey
        sync: false
      - key: Email__Provider
        value: smtp
      - key: Email__SmtpHost
        sync: false
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        sync: false
      - key: Email__SmtpPass
        sync: false
      - key: RateLimiting__GlobalPermitLimit
        value: "100"
      - key: RateLimiting__AuthPermitLimit
        value: "10"
      - key: App__FrontendUrl
        value: https://cambrianmusic.com
      - key: App__CorsOrigins
        value: "https://cambrianmusic.com,https://www.cambrianmusic.com"
      - key: App__VercelProjectSlug
        value: ""
    buildFilter:
      paths:
        - src/**
        - Dockerfile
        - Cambrian.sln