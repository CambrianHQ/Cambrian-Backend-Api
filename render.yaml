# Render Infrastructure-as-Code blueprint
# Docs: https://docs.render.com/infrastructure-as-code
#
# Production-only deploy on Render's free tier. Database lives on Neon
# (external) — DATABASE_URL is set manually as a workspace secret rather
# than auto-populated from a Render-managed database.
#
# Deploy:
#   1. New Render workspace (separate from any with billing issues)
#   2. Connect this GitHub repo
#   3. Blueprints -> New Blueprint Instance -> select this branch
#   4. Fill in all `sync: false` secrets in the dashboard, including DATABASE_URL

services:
  # ====================================================================
  #  PRODUCTION API (Render free tier, Neon DB)
  # ====================================================================
  - type: web
    name: cambrian-api
    runtime: docker
    repo: https://github.com/CambrianHQ/Cambrian-Backend-Api
    branch: main
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render injects PORT -- Dockerfile entrypoint uses it
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Database -- Neon (external). Paste the full postgresql:// URL as a
      # workspace secret. Do not commit it. See db-dumps/README or .env.
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Stripe__ConnectWebhookSecret
        sync: false
      - key: Storage__Provider
        sync: false           # must be s3 or r2 -- app refuses to start with local in Production
      - key: Storage__Endpoint
        sync: false
      - key: Storage__Bucket
        sync: false
      - key: Storage__AccessKey
        sync: false
      - key: Storage__SecretKey
        sync: false
      - key: Storage__Region
        # Supabase S3 gateway requires a real AWS region in the SigV4
        # string-to-sign. "auto" was a Cloudflare R2 leftover and caused
        # SignatureDoesNotMatch on every request. Do not change back to
        # "auto" unless this service is repointed at R2.
        value: us-east-1
      - key: Storage__UsePathStyle
        value: "true"
      - key: Storage__PublicUrl
        sync: false
      - key: Email__Provider
        value: resend
      - key: Email__FromAddress
        value: noreply@cambrianmusic.com
      - key: Email__FromName
        value: "Cambrian Music"
      - key: Email__ResendApiKey
        sync: false
      # Admin seed account
      - key: Admin__Email
        sync: false
      - key: Admin__Password
        sync: false
      # Kept as a secret slot for parity, but production code skips demo-user seeding
      - key: SeedDemoUsers__Password
        sync: false
      # Google OAuth
      - key: Google__ClientId
        sync: false
      - key: RateLimiting__GlobalPermitLimit
        value: "100"
      - key: RateLimiting__AuthPermitLimit
        value: "10"
      - key: App__FrontendUrl
        value: https://cambrianmusic.com
      - key: App__CorsOrigins
        value: "https://cambrianmusic.com,https://www.cambrianmusic.com"
      - key: App__VercelProjectSlug
        value: ""
    buildFilter:
      paths:
        - src/**
        - Dockerfile
        - Cambrian.sln
