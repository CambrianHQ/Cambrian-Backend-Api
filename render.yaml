# Render Infrastructure-as-Code blueprint
# Docs: https://docs.render.com/infrastructure-as-code
#
# Deploy:
#   1. Push to default branch
#   2. Render Dashboard -> Blueprints -> New Blueprint Instance
#   3. Select this repo -> confirm

databases:
  # -- Staging database -----------------------------------------------
  - name: cambrian-db-staging
    plan: free
    region: oregon
    databaseName: cambrian_staging
    user: cambrian
    postgresMajorVersion: "16"

  # -- Production database (uncomment when ready) ---------------------
  # - name: cambrian-db-prod
  #   plan: starter          # paid plan for persistent storage
  #   region: oregon
  #   databaseName: cambrian_prod
  #   user: cambrian
  #   postgresMajorVersion: "16"

services:
  # ====================================================================
  #  STAGING API
  # ====================================================================
  - type: web
    name: cambrian-api-staging
    runtime: docker
    repo: https://github.com/loganbryanx/Cambrian-Backend-Api
    branch: main
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render injects PORT -- Dockerfile entrypoint uses it
      - key: PORT
        value: "10000"
      # .NET environment
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      # Database -- Render auto-populates from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: cambrian-db-staging
          property: connectionString
      # JWT -- generate a strong >=32-char secret in the Render dashboard
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      # Stripe -- test keys for staging
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      # Object storage -- local for now; switch to S3/R2 when ready
      - key: Storage__Provider
        value: local
      # Email -- console logger for staging
      - key: Email__Provider
        value: console
      # Rate limiting -- relaxed for staging
      - key: RateLimiting__GlobalPermitLimit
        value: "500"
      - key: RateLimiting__AuthPermitLimit
        value: "100"
      # Frontend CORS
      - key: App__FrontendUrl
        value: https://cambrian-amber.vercel.app
      - key: App__CorsOrigins
        value: "https://cambrian-amber.vercel.app,https://cambrian-test.vercel.app,https://cambrian-staging.vercel.app"
      # Vercel preview deployment CORS wildcard
      - key: App__VercelProjectSlug
        value: cambrian-amber
    buildFilter:
      paths:
        - src/**
        - Dockerfile
        - Cambrian.sln

