# Render Infrastructure-as-Code blueprint
# Docs: https://docs.render.com/infrastructure-as-code
#
# Deploy:
#   1. Push to default branch
#   2. Render Dashboard -> Blueprints -> New Blueprint Instance
#   3. Select this repo -> confirm

databases:
  # -- Staging database -----------------------------------------------
  - name: cambrian-db-staging
    plan: free
    region: oregon
    databaseName: cambrian_staging
    user: cambrian
    postgresMajorVersion: "16"

  # -- Production database ---------------------------------------------
  - name: cambrian-db-prod
    plan: basic-256mb            # paid plan for persistent storage
    region: oregon
    databaseName: cambrian_prod
    user: cambrian
    postgresMajorVersion: "16"

services:
  # ====================================================================
  #  STAGING API
  # ====================================================================
  - type: web
    name: cambrian-api-staging
    runtime: docker
    repo: https://github.com/Cambrian-by-Kinetix-Interactive/Cambrian-Backend-Api
    branch: staging
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render injects PORT -- Dockerfile entrypoint uses it
      - key: PORT
        value: "10000"
      # .NET environment
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      # Database -- Render auto-populates from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: cambrian-db-staging
          property: connectionString
      # JWT -- generate a strong >=32-char secret in the Render dashboard       
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      # Stripe -- test keys for staging
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      # Object storage -- S3/R2 (same provider as production, separate bucket)
      - key: Storage__Provider
        sync: false
      - key: Storage__Endpoint
        sync: false
      - key: Storage__Bucket
        value: cambrian-audio-prod
      - key: Storage__AccessKey
        sync: false
      - key: Storage__SecretKey
        sync: false
      - key: Storage__Region
        # Supabase S3 gateway requires a real AWS region in the SigV4
        # string-to-sign. "auto" was a Cloudflare R2 leftover and caused
        # SignatureDoesNotMatch on every request. Do not change back to
        # "auto" unless this service is repointed at R2.
        value: us-east-1
      - key: Storage__UsePathStyle
        value: "true"
      - key: Storage__PublicUrl
        sync: false
      # Email -- Resend for staging (same domain, tagged sender name)
      - key: Email__Provider
        value: resend
      - key: Email__FromAddress
        value: noreply@cambrianmusic.com
      - key: Email__FromName
        value: "Cambrian Music (Staging)"
      - key: Email__ResendApiKey
        sync: false
      # Rate limiting -- relaxed for staging
      - key: RateLimiting__GlobalPermitLimit
        value: "500"
      - key: RateLimiting__AuthPermitLimit
        value: "100"
      # Admin seed account
      - key: Admin__Email
        sync: false
      - key: Admin__Password
        sync: false
      # Demo creators for local/staging verification (shared password, emails are deterministic in code)
      - key: SeedDemoUsers__Password
        sync: false
      # Google OAuth
      - key: Google__ClientId
        sync: false
      # Frontend CORS
      - key: App__FrontendUrl
        value: https://staging.cambrianmusic.com
      - key: App__CorsOrigins
        value: "https://staging.cambrianmusic.com"
      # Vercel preview deployment CORS wildcard
      - key: App__VercelProjectSlug
        value: cambrian
    buildFilter:
      paths:
        - src/**
        - Dockerfile
        - Cambrian.sln
  # ====================================================================
  #  PRODUCTION API
  # ====================================================================
  - type: web
    name: cambrian-api
    runtime: docker
    repo: https://github.com/Cambrian-by-Kinetix-Interactive/Cambrian-Backend-Api
    branch: main
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: cambrian-db-prod
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: cambrian-api
      - key: Jwt__Audience
        value: cambrian-client
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Storage__Provider
        sync: false           # must be s3 or r2 -- app refuses to start with local in Production
      - key: Storage__Endpoint
        sync: false
      - key: Storage__Bucket
        sync: false
      - key: Storage__AccessKey
        sync: false
      - key: Storage__SecretKey
        sync: false
      - key: Storage__Region
        # Supabase S3 gateway requires a real AWS region in the SigV4
        # string-to-sign. "auto" was a Cloudflare R2 leftover and caused
        # SignatureDoesNotMatch on every request. Do not change back to
        # "auto" unless this service is repointed at R2.
        value: us-east-1
      - key: Storage__UsePathStyle
        value: "true"
      - key: Storage__PublicUrl
        sync: false
      - key: Email__Provider
        value: resend
      - key: Email__FromAddress
        value: noreply@cambrianmusic.com
      - key: Email__FromName
        value: "Cambrian Music"
      - key: Email__ResendApiKey
        sync: false
      # Admin seed account
      - key: Admin__Email
        sync: false
      - key: Admin__Password
        sync: false
      # Kept as a secret slot for parity, but production code skips demo-user seeding
      - key: SeedDemoUsers__Password
        sync: false
      # Google OAuth
      - key: Google__ClientId
        sync: false
      - key: RateLimiting__GlobalPermitLimit
        value: "100"
      - key: RateLimiting__AuthPermitLimit
        value: "10"
      - key: App__FrontendUrl
        value: https://cambrianmusic.com
      - key: App__CorsOrigins
        value: "https://cambrianmusic.com,https://www.cambrianmusic.com"
      - key: App__VercelProjectSlug
        value: ""
    buildFilter:
      paths:
        - src/**
        - Dockerfile
        - Cambrian.sln

